name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/**/*.rs"
      - "examples/**/*.rs"
      - "tools/**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "Makefile.toml"
      - ".clippy.toml"
      - ".github/workflows/ci.yml"
      - "**/*.md"

env:
  CARGO_TERM_COLOR: always
  # The --all-features build (opentelemetry, aws-lc-sys, ring, dashboard, ...)
  # is large enough that full debuginfo can exhaust the runner's disk. Test
  # binaries don't need debuginfo, so drop it to shrink the target dir.
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        run: |
          # The default ubuntu runner ships ~25GB of preinstalled SDKs we
          # never use; removing them avoids "No space left on device" while
          # compiling the --all-features test binaries.
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-make
        uses: taiki-e/install-action@cargo-make

      - name: Install rumdl
        uses: taiki-e/install-action@v2
        with:
          tool: rumdl

      - name: Run tests
        run: cargo make test

      - name: Check examples
        run: cargo check --manifest-path examples/Cargo.toml

      # Note: stale-bindings drift is enforced by the `test-bindings` task inside
      # `cargo make test` above, so no separate verification step is needed here.

  feature-matrix:
    name: Feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: Check each feature in isolation
        run: cargo hack --each-feature --no-dev-deps check

      - name: Check feature propagation to umbrella
        run: cargo run -p feature-parity
