[package]
name = "polaris_graph"
version = "0.0.1"
description = "Graph execution primitives for Polaris (Layer 2)."
edition = "2024"
keywords = []
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/RadiantAILabs/polaris"
rust-version = "1.93.0"

[lints]
workspace = true

[dependencies]
polaris_system = { path = "../polaris_system", version = "0.0.2" }
tokio = { version = "1", features = ["time"] }
futures = "0.3"
hashbrown = "0.16.1"
parking_lot = "0.12.5"
nanoid = "0.4"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time"] }
proptest = "1"
