[package]
name = "polaris_internal"
version = "0.0.4"
description = "An internal Polaris crate"
edition = "2024"
keywords = []
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/RadiantAILabs/polaris"
rust-version = "1.93.0"

[features]
default = []
anthropic = ["polaris_model_providers/anthropic"]
openai = ["polaris_model_providers/openai"]
bedrock = ["polaris_model_providers/bedrock"]
graph-tracing = ["polaris_core_plugins/graph_tracing"]
models-tracing = ["polaris_core_plugins/models_tracing"]
tools-tracing = ["polaris_core_plugins/tools_tracing"]
otel = ["polaris_core_plugins/otel"]
sessions-http = ["polaris_sessions/http"]

[dependencies]
polaris_system = { path = "../polaris_system", version = "0.0.3" }
polaris_graph = { path = "../polaris_graph", version = "0.1.0" }
polaris_agent = { path = "../polaris_agent", version = "0.0.2" }
polaris_tools = { path = "../polaris_tools", version = "0.0.2" }
polaris_model_providers = { path = "../polaris_model_providers", version = "0.0.2" }
polaris_models = { path = "../polaris_models", version = "0.0.2" }
polaris_core_plugins = { path = "../polaris_core_plugins", version = "0.0.12" }
polaris_sessions = { path = "../polaris_sessions", version = "0.0.2" }
polaris_shell = { path = "../polaris_shell", version = "0.0.2" }
polaris_app = { path = "../polaris_app", version = "0.0.2" }

[lints]
workspace = true
