[package]
name = "polaris_internal"
version.workspace = true
description = "An internal Polaris crate"
edition.workspace = true
keywords = []
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true

[features]
default = []
anthropic = ["polaris_model_providers/anthropic"]
openai = ["polaris_model_providers/openai"]
bedrock = ["polaris_model_providers/bedrock"]
graph-tracing = ["polaris_core_plugins/graph_tracing"]
models-tracing = ["polaris_core_plugins/models_tracing"]
tools-tracing = ["polaris_core_plugins/tools_tracing"]
tiktoken = ["polaris_models/tiktoken"]
otel = ["polaris_core_plugins/otel"]
sessions-http = ["polaris_sessions/http"]

[dependencies]
polaris_system = { path = "../polaris_system", version = "0.1.1" }
polaris_graph = { path = "../polaris_graph", version = "0.1.1" }
polaris_agent = { path = "../polaris_agent", version = "0.1.1" }
polaris_tools = { path = "../polaris_tools", version = "0.1.1" }
polaris_model_providers = { path = "../polaris_model_providers", version = "0.1.1" }
polaris_models = { path = "../polaris_models", version = "0.1.1" }
polaris_core_plugins = { path = "../polaris_core_plugins", version = "0.1.1" }
polaris_sessions = { path = "../polaris_sessions", version = "0.1.1" }
polaris_shell = { path = "../polaris_shell", version = "0.1.1" }
polaris_app = { path = "../polaris_app", version = "0.1.1" }

[lints]
workspace = true
