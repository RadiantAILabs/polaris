[package]
name = "polaris_internal"
version = "0.0.1"
description = "An internal Polaris crate"
edition = "2024"
keywords = []

[features]
default = []
anthropic = ["polaris_model_providers/anthropic"]
openai = ["polaris_model_providers/openai"]
bedrock = ["polaris_model_providers/bedrock"]
graph_tracing = ["polaris_core_plugins/graph_tracing"]
models_tracing = ["polaris_core_plugins/models_tracing"]
tools_tracing = ["polaris_core_plugins/tools_tracing"]
otel = ["polaris_core_plugins/otel"]

[dependencies]
polaris_system = { path = "../polaris_system" }
polaris_graph = { path = "../polaris_graph" }
polaris_agent = { path = "../polaris_agent" }
polaris_tools = { path = "../polaris_tools" }
polaris_model_providers = { path = "../polaris_model_providers" }
polaris_models = { path = "../polaris_models" }
polaris_core_plugins = { path = "../polaris_core_plugins" }
polaris_sessions = { path = "../polaris_sessions" }
polaris_shell = { path = "../polaris_shell" }

[lints]
workspace = true
